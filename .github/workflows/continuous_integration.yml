name: Continuous Integration

on:
  push:
    branches:
      - main
      - actions-*
  pull_request:
    branches-ignore:
      - actions-*
  workflow_dispatch:

jobs:
  build:
    name: build ruby-${{ matrix.ruby }} ${{ matrix.appraisal }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: "ruby"
            standardrb: true
            yard: true
          - ruby: "3.4"
            appraisal: rails_8
          - ruby: "3.3"
            appraisal: rails_8.0
          - ruby: "3.1"
            appraisal: rails_7
          - ruby: "3.0"
            appraisal: rails_7.1
          - ruby: "ruby"
            appraisal: no_rails
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Ruby CI
        uses: bdurand/github-actions/ruby-ci@v1.0.3
        with:
          ruby: ${{ matrix.ruby }}
          appraisal: ${{ matrix.appraisal }}
          bundler: ${{ matrix.bundler }}
          standardrb: ${{ matrix.standardrb }}
          yard: ${{ matrix.yard }}
          frozen_strings: ${{ matrix.frozen_strings }}
